<!DOCTYPE html> <!--Specifies this is an HTML5 documents-->
<html lang="en"><!--Root of an HTML page-->
<head> <!--Contains page metadata.-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basics of HTML</title> <!--Contains title of webpage.-->
</head>
<body> <!--The main body of the webpage.In this we write code to display on browser. -->
    <h1>HTML</h1> <!--This is heading. <h1>--Heading Tag--</h2> -->
    <p>HTML is a hypertext markup language.It is used to provide structure of your website.</p> <!--This is paragraph. <p>--Paragraph Tag -->

    <h2>CSS</h2>
    <p>CSS is a cascading style sheet. It is used to style the website. </p>
    
</body>
</html>
