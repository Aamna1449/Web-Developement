<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Box Model</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    .box{
        width: 300px;
        height: 50px;
        margin: 0;
        padding: 0;
        background-color: antiquewhite;
        border: 2px solid rgb(201, 134, 45);
    }
    .box{
        margin: 0;
        padding: 0;
        color: rgb(201, 134, 45);
    }

</style>
<body>
    <div class="box">
        <div class="box1">
            <p>Lorem ipsum dolor sit amet.</p>
        </div>
    </div>
    
</body>
</html>
