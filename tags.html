<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Tags</title>
</head>
<!--HTML Element-->
<body>
    <!--HTML Attributes-->
    <!--Anchor Tag-->

    <a href="https://google.com">Click</a>

    <!--The Heading Tags-->
    <h1> Most important heading</h1>
    <h2>Another Heading H2</h2>
    <h3>Another heading H3</h3>
    <h4>Another heading H4</h4>
    <h5>Another heading H5</h5>
    <h6>Another heading H6</h6>

    <!--Paragraph Tag-->
    <p>This is paragraph</p>

    <!--Image tag-->
    <img src="image.jpg" width="55" height="55" alt="">
    
    <pre>This is 
        written using
        html
    </pre>

    <!--The Div Tag-->
    <div>
        <h1>This is heading inside a div</h1>
        <p>This is paragraph inside a div</p>
    </div>

    <!--span Tag-->
    <p>This is a <span>highlighted</span> word in a sentence</p>
    
</body>
</html>
