<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Tags</title>
</head>
<body>
    <!--Ordered List-->
    <h3>Fruits</h3>
    <ol>
        <li>Mango</li>
        <li>Apple</li>
        <li>Cherry</li>
    </ol>
    <h3>List of languages</h3>
    <ol type="A">
            <li>C</li>
            <li>C++</li>
            <li>Python</li>
    </ol>
    <h3>Vegetables</h3>
    <ol type="I">
        <li>Potato</li>
        <li>Tomato</li>
        <li>Onion</li>
        <li>Carrot</li>
        <li>Garlic</li>
    </ol>
</body>
</html>
